basePath: /gestrym-auth
definitions:
  structs.CreateAccessLevelRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - description
    - name
    type: object
  structs.CreateActionRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  structs.CreatePermissionRequest:
    properties:
      action_id:
        type: integer
      resource_id:
        type: integer
      role_id:
        type: integer
    required:
    - action_id
    - resource_id
    - role_id
    type: object
  structs.CreateUserTokenTypeRequest:
    properties:
      type:
        type: string
    required:
    - type
    type: object
  structs_request.PasswordRecoveryRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  structs_request.PasswordResetRequest:
    properties:
      password:
        minLength: 8
        type: string
      token:
        type: string
    required:
    - password
    - token
    type: object
  structs_request.RegisterRequest:
    properties:
      avatar_file_id:
        type: integer
      city:
        type: string
      country:
        type: string
      department:
        type: string
      email:
        type: string
      name:
        type: string
      password:
        type: string
      phone:
        type: string
      prefix:
        type: string
      primary_color:
        type: string
      referral_code:
        type: string
      registration_source:
        enum:
        - self
        - gym
        - trainer
        type: string
      role_id:
        type: integer
      secondary_color:
        type: string
      source_id:
        type: integer
      username:
        type: string
      workstation:
        type: string
    required:
    - email
    - name
    - password
    - phone
    - prefix
    - registration_source
    - role_id
    - username
    type: object
  structs_request.UpdateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      phone:
        type: string
      prefix:
        type: string
    type: object
  structs_roles.CreateRoleRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  structs_roles.UpdateRoleRequest:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
info:
  contact: {}
  description: API para el manejo de autenticación de usuarios.
  title: Gestrym API
  version: "1.0"
paths:
  /access_levels:
    get:
      description: Obtiene un listado de niveles del sistema.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Listar Niveles de acceso (CRUD)
      tags:
      - Access Levels
    post:
      consumes:
      - application/json
      description: Permite crear un nuevo nivel de acceso para la jerarquía.
      parameters:
      - description: Datos del nivel de acceso
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs.CreateAccessLevelRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Crear un Nivel de Acceso (CRUD)
      tags:
      - Access Levels
  /actions:
    get:
      description: Obtiene un listado de todas las acciones del sistema.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Listar Acciones (CRUD)
      tags:
      - Actions
    post:
      consumes:
      - application/json
      description: Permite crear una nueva acción para el catálogo de permisos.
      parameters:
      - description: Datos de la acción
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs.CreateActionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Crear una Acción (CRUD)
      tags:
      - Actions
  /permissions:
    post:
      consumes:
      - application/json
      description: Crea un nuevo permiso en el sistema.
      parameters:
      - description: Datos del permiso
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs.CreatePermissionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Crear Permiso
      tags:
      - Permissions
  /private/auth/relationships:
    get:
      consumes:
      - application/json
      description: Si el usuario es coach, devuelve clientes independientes y clientes
        de gimnasio separados. Si el usuario es gym, devuelve entrenadores y sus clientes
        de gimnasio.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Obtener relaciones de clientes del entrenador o entrenadores del gimnasio
      tags:
      - Auth
  /private/auth/users:
    get:
      consumes:
      - application/json
      description: Obtiene una lista de todos los usuarios registrados en el sistema
      parameters:
      - description: Número de página
        in: query
        name: page
        type: integer
      - description: Tamaño de la página
        in: query
        name: page_size
        type: integer
      - description: Nombre del usuario
        in: query
        name: name
        type: string
      - description: DNI del usuario
        in: query
        name: dni
        type: string
      - description: email del usuario
        in: query
        name: email
        type: string
      - description: ID del rol del usuario
        in: query
        name: role_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Consultar todos los usuarios registrados
      tags:
      - Auth
  /private/auth/users/{id}:
    delete:
      consumes:
      - application/json
      description: Desactiva el usuario marcando is_active en falso
      parameters:
      - description: ID del usuario
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Eliminar (soft delete) usuario
      tags:
      - Auth
    get:
      consumes:
      - application/json
      description: Devuelve el usuario con el ID especificado
      parameters:
      - description: ID del usuario
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Obtener usuario por ID
      tags:
      - Auth
    put:
      consumes:
      - application/json
      description: Modifica los campos del usuario especificado
      parameters:
      - description: ID del usuario
        in: path
        name: id
        required: true
        type: integer
      - description: Datos a actualizar
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs_request.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Actualizar información de usuario
      tags:
      - Auth
  /private/roles/{id}:
    delete:
      description: Marca un rol como inactivo en lugar de eliminarlo físicamente.
      parameters:
      - description: ID del rol
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BasicAuth: []
      summary: Deshabilitar Rol
      tags:
      - Roles
    put:
      consumes:
      - application/json
      description: Actualiza los datos de un rol existente.
      parameters:
      - description: ID del rol
        in: path
        name: id
        required: true
        type: integer
      - description: Estructura de actualización del rol
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs_roles.UpdateRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BasicAuth: []
      summary: Editar Rol
      tags:
      - Roles
  /public/auth/confirm:
    get:
      consumes:
      - application/json
      description: Activa al usuario cuando el token de confirmación es válido
      parameters:
      - description: Token de confirmación
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Confirmar email de usuario
      tags:
      - Auth
  /public/auth/password/recovery:
    post:
      consumes:
      - application/json
      description: Envía un enlace de recuperación al email del usuario
      parameters:
      - description: Email del usuario
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs_request.PasswordRecoveryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Solicitar recuperación de contraseña
      tags:
      - Auth
  /public/auth/password/reset:
    post:
      consumes:
      - application/json
      description: Cambia la contraseña usando el token de recuperación
      parameters:
      - description: Token y nueva contraseña
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs_request.PasswordResetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Restablecer contraseña
      tags:
      - Auth
  /public/auth/register:
    post:
      consumes:
      - application/json
      description: Crea un nuevo usuario públicamente. Solo permite roles Cliente
        (1) o Coach (2) o Gym (3).
      parameters:
      - description: Datos del usuario
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs_request.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Registrar Coach o Gimnasio o Cliente
      tags:
      - Auth
  /public/roles:
    get:
      description: Obtiene todos los roles disponibles.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Obtener todos los Roles
      tags:
      - Roles
    post:
      consumes:
      - application/json
      description: Crea un nuevo rol en la base de datos (Admin, Gym, etc).
      parameters:
      - description: Estructura de creación del rol
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs_roles.CreateRoleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Crear Rol
      tags:
      - Roles
  /token_types:
    get:
      description: Obtiene un listado de los tipos.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Listar Tipos de Token (CRUD)
      tags:
      - Token Types
    post:
      consumes:
      - application/json
      description: Permite crear un nuevo tipo de token.
      parameters:
      - description: Datos del tipo de token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs.CreateUserTokenTypeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Crear Tipo de Token (CRUD)
      tags:
      - Token Types
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: X-API-Key
    type: apiKey
  BasicAuth:
    type: basic
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
